name: Daily Market Scan

on:
  schedule:
    - cron: '0 6 * * *' # יריץ כל יום ב-6 בבוקר UTC (שזה 9 בבוקר בישראל)
  workflow_dispatch: # מאפשר הרצה ידנית בלחיצת כפתור ב-GitHub

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run Daily Scanner
        run: node scripts/daily-scanner.js
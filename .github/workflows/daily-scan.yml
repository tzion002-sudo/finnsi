name: Daily Market Scan

on:
  schedule:
    # ב-05:00 UTC = 08:00 ישראל (קיץ UTC+3) — ימי חול בלבד
    - cron: '0 5 * * 1-5'
  workflow_dispatch:
    # מאפשר הרצה ידנית מ-GitHub Actions בלחיצת כפתור

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # הסורק לא אמור לקחת יותר מ-10 דקות

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run Daily Market Scanner
        run: node scripts/daily-scanner.js
        env:
          NODE_ENV: production
          # V2.9.0 — WhatsApp Business Cloud API (אופציונלי — דוח שבועי בכל יום שני)
          # הגדרה: developers.facebook.com/apps → WhatsApp → Getting Started
          WHATSAPP_TOKEN:    ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          WHATSAPP_TO:       ${{ secrets.WHATSAPP_TO }}
          # V2.9.1 — Gmail דוח בוקר יומי (אופציונלי)
          # הגדרה: myaccount.google.com/apppasswords → צור App Password
          GMAIL_FROM:         tzion002@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}

      - name: Report scan result
        if: always()
        run: |
          echo "✅ Scan completed at $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "🕐 Israel time: $(TZ='Asia/Jerusalem' date '+%Y-%m-%d %H:%M')"

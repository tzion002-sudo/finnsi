name: On-Demand Price Fetch

# V2.9.9 — נקרא מהאפליקציה כשהמשתמש לוחץ "עדכן מחירים"
# GitHub API → workflow_dispatch → daily-scanner.js → Firestore
# ⚠️ ללא secrets של Gmail/WhatsApp — לא נשלחים מיילים/הודעות בלחיצת on-demand
on:
  workflow_dispatch:
    inputs:
      source:
        description: 'מקור הטריגר (app / manual)'
        required: false
        default: 'app'

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run Scanner (On-Demand)
        run: node scripts/daily-scanner.js
        env:
          NODE_ENV: production
          # ☝️ במכוון לא מעבירים GMAIL_* או WHATSAPP_* כדי שלא יישלחו הודעות
          #    בכל לחיצה על "עדכן מחירים". הסקנר היומי השלם (daily-scan.yml)
          #    הוא היחיד ששולח את דוח הבוקר.

      - name: Done
        run: echo "✅ Prices updated at $(TZ='Asia/Jerusalem' date '+%H:%M:%S') Israel time (triggered by ${{ github.event.inputs.source }})"
